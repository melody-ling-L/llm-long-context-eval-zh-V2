# ==============================
# V2 实验元信息
# ==============================
meta:
  experiment_name: "v2"
  version: "v2"
  description: "N=10 + 风格对齐 needle + numeric confusable + multi-key + 扩展多跳"

# ==============================
# 模型配置
# ==============================
models:
  deepseek:
    api_base: "https://api.deepseek.com/v1"
    model_name: "deepseek-chat"
    max_tokens: 256
    rpm_limit: 60

  kimi:
    api_base: "https://api.moonshot.cn/v1"
    model_name: "moonshot-v1-128k"
    max_tokens: 256
    rpm_limit: 20

  qwen:
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen-long"
    max_tokens: 256
    rpm_limit: 60

# ==============================
# 评测参数
# ==============================
eval:
  context_lengths: [2000, 4000, 8000, 16000, 32000]
  depth_percentages: [0, 10, 25, 50, 75, 90, 100]

  niah:
    num_samples_per_config: 10
    seed: 2026
    needle_bank_path: "data/needles/v2_needle_bank.json"
    variants: ["style_aligned", "numeric_confusable", "multi_key"]

  multi_hop:
    qa_path: "data/needles/multihop_qa_v2.json"
    num_samples: null

# ==============================
# 路径配置
# ==============================
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed/v2"

results:
  raw_dir: "results/v2/raw"
  processed_dir: "results/v2/processed"
  figures_dir: "results/v2/figures"

analysis:
  primary_score: "contains_score"
  ci_level: 0.95
  variant_order: ["style_aligned", "numeric_confusable", "multi_key"]
